{% extends "base.html" %}
{% block title %}Admin Access — DocUnlock{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Admin Access</h1>
    <p class="auth-sub">Enter the passphrase to access the admin panel.</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="auth-form">
      <label class="auth-label" for="passphrase">Passphrase</label>
      <input type="password" id="passphrase" name="passphrase" class="auth-input" required autofocus>
      <button type="submit" class="auth-btn">Access Admin</button>
    </form>
  </div>
</div>
{% endblock %}
