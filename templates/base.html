<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Remove PDF passwords quickly and privately with DocUnlock. Free PDF unlock tool with automatic file deletion in 15 minutes." />
  <meta name="keywords" content="unlock PDF,remove PDF password,PDF password remover,free PDF unlock,private PDF unlock" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-title" content="DocUnlock" />
  <title>{% block title %}DocUnlock{% endblock %}</title>
  <link rel="canonical" href="{{ request.url }}" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="DocUnlock" />
  <meta property="og:title" content="DocUnlock — Remove PDF Password" />
  <meta property="og:description" content="Unlock password-protected PDFs fast and securely. Files auto-delete after 15 minutes." />
  <meta property="og:image" content="/static/img/android-chrome-512x512.png" />
  <meta property="og:image:alt" content="DocUnlock logo" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:url" content="{{ request.url }}" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DocUnlock — Remove PDF Password" />
  <meta name="twitter:description" content="Unlock password-protected PDFs fast and securely. Files auto-delete after 15 minutes." />
  <meta name="twitter:image" content="/static/img/android-chrome-512x512.png" />

  <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/static/img/android-chrome-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/static/img/android-chrome-512x512.png" />
  <link rel="shortcut icon" href="/static/img/favicon.ico" />
  <link rel="manifest" href="/static/site.webmanifest" />
  <meta name="msapplication-TileColor" content="#0b1220" />
  <meta name="msapplication-TileImage" content="/static/img/android-chrome-192x192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="noise-overlay"></div>

  <header class="site-header">
    <a href="/" class="brand">
      <img src="/static/img/android-chrome-192x192.png" alt="DocUnlock logo" class="brand-logo" />
      <span class="brand-name">DocUnlock</span>
    </a>
    <button class="btn-install d-none" id="installAppBtn" type="button">Install App</button>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Files are automatically deleted within 15 minutes &mdash; no data retained.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/base.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
